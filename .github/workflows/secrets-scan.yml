# Detects accidental credential disclosure on every push and pull request, and
# runs a weekly full-history sweep against the default branch.
#
# The token referenced below is provisioned by GitGuardian's 30-day trial —
# rotate/replace with the production token once the trial expires. The token
# is stored exclusively as a GitHub Actions repository secret
# (`GITGUARDIAN_API_KEY`); it is never written to source, commit messages,
# PR descriptions, or workflow logs.
#
# Reference: docs/security/secrets-rotation.md (rotation cadence + emergency
# rotation procedure).

name: Secrets Scan

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  schedule:
    # Weekly sweep in addition to per-push + per-PR runs.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  ggshield:
    name: GitGuardian secret scan
    runs-on: ubuntu-latest
    env:
      # GitGuardian public instance — switch to https://dashboard.eu.gitguardian.com
      # if the trial was provisioned on the EU tenant.
      GITGUARDIAN_API_URL: https://api.gitguardian.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Pin to exactly the version the pre-commit gate uses (see
      # .pre-commit-config.yaml) so local and CI detectors behave identically
      # and the gate is reproducible / auditable.
      - name: Install ggshield
        run: |
          python -m pip install --upgrade pip
          pip install "ggshield[all]==1.52.2"

      - name: ggshield secret scan (full history)
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          # `ggshield secret scan repo` walks every reachable commit in the
          # local repository, so a credential that was added and later
          # removed in source still surfaces here. `--all-secrets` surfaces
          # matches the engine would otherwise suppress so reviewers can
          # decide on ignore lists explicitly.
          #
          # Exclusions are limited to clearly-non-secret-bearing build/vendor
          # artefacts. We deliberately do NOT exclude `*.lock` because lock
          # files (uv.lock, package-lock.json, etc.) can embed private
          # registry URLs or auth tokens, and they ARE committed artefacts.
          ggshield secret scan repo \
            --exclude-path .venv \
            --exclude-path dist \
            --exclude-path build \
            --exclude-path node_modules \
            --exclude-path "*.min.js" \
            --all-secrets \
            .
