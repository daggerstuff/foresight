# Detects accidental credential disclosure on every push and pull request by
# scanning the changed working tree. A weekly scheduled run re-scans the
# default branch's current tree as a belt-and-braces sweep.
#
# The token referenced below is provisioned by GitGuardian's 30-day trial —
# rotate/replace with the production token once the trial expires. The token
# is stored exclusively as a GitHub Actions repository secret
# (`GITGUARDIAN_API_KEY`); it is never written to source, commit messages,
# PR descriptions, or workflow logs.
#
# Reference: docs/security/secrets-rotation.md (rotation cadence + emergency
# rotation procedure).

name: Secrets Scan

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  schedule:
    # Weekly sweep in addition to per-push + per-PR runs.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  ggshield:
    name: GitGuardian secret scan
    runs-on: ubuntu-latest
    env:
      # GitGuardian public instance — switch to https://dashboard.eu.gitguardian.com
      # if the trial was provisioned on the EU tenant.
      GITGUARDIAN_API_URL: https://api.gitguardian.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Pin to exactly the version the pre-commit gate uses (see
      # .pre-commit-config.yaml) so local and CI detectors behave identically
      # and the gate is reproducible / auditable.
      - name: Install ggshield
        run: |
          python -m pip install --upgrade pip
          pip install "ggshield[all]==1.52.2"

      - name: ggshield secret scan (current tree)
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          # We scan the *current working tree* (path .) rather than the full
          # commit history (repo .). ggshield 1.52.2's commit-patch parser
          # crashes ("not enough values to unpack") on filter-repo-rewritten
          # commits, so `secret scan repo` is unreliable for our history.
          # Scanning the tree still catches any secret present in the changed
          # files of this PR/commit — which is the actual goal of a PR gate.
          #
          # `--yes` bypasses the interactive "N files will be scanned" prompt
          # in non-interactive CI. Exclusions are limited to non-secret build
          # artefacts; we deliberately keep `*.lock` in scope (uv.lock etc.
          # can embed private registry tokens).
          ggshield secret scan path . \
            --recursive \
            --yes \
            --exclude .venv \
            --exclude dist \
            --exclude build \
            --exclude node_modules \
            --exclude "*.min.js"
