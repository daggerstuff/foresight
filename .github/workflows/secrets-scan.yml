# Detects accidental credential disclosure on every push and pull request.
#
# The token referenced below is provisioned by GitGuardian's 30-day trial —
# rotate/replace with the production token once the trial expires. The token
# is stored exclusively as a GitHub Actions repository secret
# (`GITGUARDIAN_API_KEY`); it is never written to source, commit messages,
# PR descriptions, or workflow logs.
#
# Reference: docs/security/secrets-rotation.md (rotation cadence + emergency
# rotation procedure).

name: Secrets Scan

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  schedule:
    # Weekly sweep in addition to per-commit + per-PR runs.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  ggshield:
    name: GitGuardian secret scan
    runs-on: ubuntu-latest
    env:
      # GitGuardian public instance — switch to https://dashboard.eu.gitguardian.com
      # if the trial was provisioned on the EU tenant.
      GITGUARDIAN_API_URL: https://api.gitguardian.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ggshield
        run: |
          python -m pip install --upgrade pip
          pip install "ggshield[all]"

      - name: ggshield secret scan
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          # Fail (non-zero exit) on any detected secret across the full
          # reachable history. Excludes obvious build/vendor artefacts that
          # routinely trip scanners but carry no live credentials.
          ggshield secret scan \
            --exclude-path .venv \
            --exclude-path dist \
            --exclude-path build \
            --exclude-path "*.lock" \
            --exclude-path "*.min.js" \
            --exclude-path "node_modules" \
            --all-secrets \
            .
